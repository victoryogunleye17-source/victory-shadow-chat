<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password · Shadow Chat</title>
<link rel="stylesheet" href="/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="ambient-bg"></div>
<div class="center-screen">
  <div class="glass" style="width:100%;max-width:420px;padding:40px 36px;">
    <h1 class="display" style="font-size:22px;margin:0 0 8px;">Set a new password</h1>
    <p class="text-secondary" style="font-size:14px;margin:0 0 24px;">Choose something strong and unique.</p>
    <div id="alertBox"></div>
    <form id="resetForm">
      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required minlength="8" placeholder="At least 8 characters">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required minlength="8" placeholder="Repeat password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;" id="submitBtn">Update Password</button>
    </form>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  const token = params.get('token');

  const form = document.getElementById('resetForm');
  const alertBox = document.getElementById('alertBox');
  const submitBtn = document.getElementById('submitBtn');

  if (!email || !token) {
    alertBox.innerHTML = `<div class="alert alert-error">This reset link is invalid. <a href="/forgot-password.html">Request a new one</a>.</div>`;
    form.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
      alertBox.innerHTML = `<div class="alert alert-error">Passwords do not match.</div>`;
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating…';
    try {
      const data = await ShadowAPI.post('/api/auth?action=reset-password', { email, token, newPassword });
      alertBox.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
      form.style.display = 'none';
      setTimeout(() => window.location.href = '/login.html', 1800);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Update Password';
    }
  });
</script>
</body>
</html>
