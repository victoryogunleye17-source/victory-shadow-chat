<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password · Shadow Chat</title>
<link rel="stylesheet" href="/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="ambient-bg"></div>
<div class="center-screen">
  <div class="glass" style="width:100%;max-width:420px;padding:40px 36px;">
    <h1 class="display" style="font-size:22px;margin:0 0 8px;">Reset your password</h1>
    <p class="text-secondary" style="font-size:14px;margin:0 0 24px;">We'll email you a secure link to reset it.</p>
    <div id="alertBox"></div>
    <form id="forgotForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;" id="submitBtn">Send Reset Link</button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:13px;">
      <a href="/login.html">Back to Sign In</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  const form = document.getElementById('forgotForm');
  const alertBox = document.getElementById('alertBox');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    const email = document.getElementById('email').value.trim();
    try {
      const data = await ShadowAPI.post('/api/auth?action=forgot-password', { email });
      alertBox.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
      form.reset();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
