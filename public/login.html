<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · Shadow Chat</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="ambient-bg"></div>

<div class="center-screen">
  <div class="glass" style="width:100%;max-width:420px;padding:40px 36px;">

    <div style="text-align:center;margin-bottom:32px;">
      <div class="signal-ring online" style="margin-bottom:14px;">
        <div class="avatar" style="width:52px;height:52px;font-size:22px;background:linear-gradient(135deg,#3fa9ff,#11182c);color:#05060a;">SC</div>
      </div>
      <h1 class="display" style="font-size:26px;margin:0 0 4px;">Shadow Chat</h1>
      <p class="text-secondary" style="font-size:14px;margin:0;">Private messaging, encrypted by default.</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;" id="submitBtn">
        Sign In
      </button>
    </form>

    <div style="display:flex;justify-content:space-between;margin-top:20px;font-size:13px;">
      <a href="/forgot-password.html">Forgot password?</a>
      <a href="/register.html">Create account</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const alertBox = document.getElementById('alertBox');
  const submitBtn = document.getElementById('submitBtn');

  // Already logged in? Skip straight to chat.
  if (ShadowAPI.getToken()) window.location.href = '/chat.html';

  function showAlert(message, type = 'error') {
    alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.innerHTML = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await ShadowAPI.post('/api/auth?action=login', { email, password });
      ShadowAPI.setToken(data.token);
      ShadowAPI.setUser(data.user);
      window.location.href = '/chat.html';
    } catch (err) {
      if (err.data?.needsVerification) {
        showAlert(`Please verify your email first. <a href="/resend-verification.html?email=${encodeURIComponent(email)}">Resend verification email</a>`, 'info');
      } else if (err.data?.banned) {
        showAlert('This account has been banned.');
      } else if (err.data?.suspended) {
        showAlert('This account is temporarily suspended.');
      } else {
        showAlert(err.message || 'Login failed.');
      }
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
